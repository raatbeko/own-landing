<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Me</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a2e1a; overflow:hidden; font-family:'Courier New',monospace; }
canvas { display:block; }

#ui {
  position:fixed; bottom:36px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:18px; z-index:10;
}
.btn {
  width:54px; height:54px; border-radius:50%;
  background:rgba(10,20,10,0.65);
  border:1.5px solid rgba(150,255,150,0.3);
  color:#a0ffa0; font-size:20px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(10px);
  transition:all 0.2s; user-select:none;
}
.btn:hover { background:rgba(10,20,10,0.9); border-color:rgba(150,255,150,0.7); color:#fff; }
.btn:active { transform:scale(0.93); }
.btn:disabled { opacity:0.22; cursor:default; transform:none !important; }

#dots { display:flex; gap:10px; align-items:center; }
.dot {
  width:9px; height:9px; border-radius:50%;
  background:rgba(255,255,255,0.15);
  border:1.5px solid rgba(255,255,255,0.25);
  transition:all 0.3s;
}
.dot.on { background:#7dff7d; border-color:#7dff7d; box-shadow:0 0 8px #7dff7d; transform:scale(1.35); }

#hint {
  position:fixed; top:28px; left:50%; transform:translateX(-50%);
  color:rgba(200,255,200,0.4); font-size:11px; letter-spacing:3px;
  text-transform:uppercase; pointer-events:none; transition:opacity 1s;
}

#char-hint {
  position:fixed;
  pointer-events:none;
  z-index:15;
  transform:translate(-50%, -100%);
  transition:opacity 0.6s ease;
}
.char-hint-inner {
  background:rgba(6,18,6,0.85);
  border:1px solid rgba(150,255,150,0.22);
  border-radius:12px;
  padding:8px 14px;
  white-space:nowrap;
  backdrop-filter:blur(14px);
  position:relative;
  display:flex;
  align-items:center;
  gap:8px;
}
.char-hint-inner::after {
  content:'';
  position:absolute;
  bottom:-8px; left:50%; transform:translateX(-50%);
  border-left:8px solid transparent;
  border-right:8px solid transparent;
  border-top:8px solid rgba(6,18,6,0.85);
}
.char-hint-key {
  width:26px; height:26px; border-radius:6px;
  background:rgba(125,255,125,0.1);
  border:1px solid rgba(125,255,125,0.35);
  color:#7dff7d; font-size:15px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Courier New',monospace;
  animation:key-pulse 1.4s ease-in-out infinite;
}
.char-hint-key.right { animation-delay:0.3s; }
.char-hint-text {
  font-size:10px; letter-spacing:2px;
  color:rgba(200,255,200,0.6);
  text-transform:uppercase;
  font-family:'Courier New',monospace;
}
@keyframes key-pulse {
  0%,100% { border-color:rgba(125,255,125,0.35); color:#7dff7d; }
  50%      { border-color:rgba(125,255,125,0.85); color:#fff; box-shadow:0 0 8px rgba(125,255,125,0.35); }
}

#social-popup {
  position:fixed;
  pointer-events:none;
  z-index:20;
  transform:translate(-50%, -100%) translateY(0px);
  opacity:0;
  transition:opacity 0.4s ease, transform 0.45s cubic-bezier(0.34,1.5,0.64,1);
}
#social-popup.show {
  opacity:1;
  pointer-events:auto;
  transform:translate(-50%, -100%) translateY(-22px);
}
.popup-inner {
  background:rgba(6,18,6,0.88);
  border:1px solid rgba(180,255,180,0.18);
  border-radius:20px;
  padding:22px 28px 18px;
  text-align:center;
  backdrop-filter:blur(18px);
  min-width:190px;
  position:relative;
}
.popup-inner::after {
  content:'';
  position:absolute; bottom:-10px; left:50%; transform:translateX(-50%);
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-top:10px solid rgba(6,18,6,0.88);
}
.popup-icon {
  width:64px; height:64px; border-radius:50%;
  margin:0 auto 12px;
  display:flex; align-items:center; justify-content:center;
  position:relative;
}
.popup-icon svg { width:38px; height:38px; display:block; position:relative; z-index:1; }
@keyframes pulse-ring {
  0%   { transform:scale(0.95); opacity:0.7; }
  100% { transform:scale(1.6);  opacity:0; }
}
.pulse-ring {
  position:absolute; inset:0; border-radius:50%;
  animation:pulse-ring 1.8s ease-out infinite;
}
.popup-name {
  color:rgba(255,255,255,0.45);
  font-size:10px; letter-spacing:3px; text-transform:uppercase;
  margin-bottom:5px;
}
.popup-handle {
  color:#fff; font-size:15px; font-weight:bold; letter-spacing:0.5px;
  margin-bottom:16px;
}
.popup-cta {
  display:inline-flex; align-items:center; gap:7px;
  padding:9px 20px; border-radius:30px;
  border:1.5px solid currentColor;
  font-size:11px; letter-spacing:2px; text-transform:uppercase;
  text-decoration:none; cursor:pointer;
  transition:background 0.2s, transform 0.15s;
  font-family:'Courier New',monospace;
}
.popup-cta:hover { background:rgba(255,255,255,0.1); transform:scale(1.05); }
.popup-cta:active { transform:scale(0.97); }
</style>
</head>
<body>

<div id="hint">← нажимай стрелки →</div>

<div id="char-hint">
  <div class="char-hint-inner">
    <div class="char-hint-key">←</div>
    <div class="char-hint-text">иди</div>
    <div class="char-hint-key right">→</div>
  </div>
</div>

<div id="social-popup">
  <div class="popup-inner">
    <div class="popup-icon" id="pop-icon"></div>
    <div class="popup-name" id="pop-name"></div>
    <div class="popup-handle" id="pop-handle"></div>
    <a class="popup-cta" id="pop-cta" href="#" target="_blank">
      Открыть
      <svg viewBox="0 0 16 16" fill="none" style="width:13px;height:13px">
        <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </div>
</div>

<div id="ui">
  <button class="btn" id="bL" disabled>←</button>
  <div id="dots">
    <div class="dot on" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
  </div>
  <button class="btn" id="bR">→</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── EDIT YOUR LINKS HERE ──────────────────────────────────────
const STOPS = [
  { label:'Старт',    color:0x4a9a4a, url:null,                              handle:null,      accent:'#7dff7d',
    svg:`<svg viewBox="0 0 38 38"><circle cx="19" cy="19" r="17" fill="#4a9a4a"/><path d="M19 10v18M10 19h18" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>` },
  { label:'Telegram', color:0x2297d6, url:'https://t.me/+xBs3D6Nw8IQ2ZWNi',                           handle:'Raatbek', accent:'#29b6f6',
    svg:`<svg viewBox="0 0 38 38"><circle cx="19" cy="19" r="17" fill="#229ED9"/><path d="M27 12L8 19c-1.2.5-1.1 1.1-.1 1.4l4.8 1.5 11.1-7c.5-.3.9.05.5.4L15 21.5l-.4 4.8c.5 0 .8-.2 1-.5l2.4-2.3 4.8 3.5c.9.5 1.5.2 1.7-.8l3-14.2c.3-1.2-.4-1.7-1-1.5z" fill="#fff"/></svg>` },
  { label:'LinkedIn', color:0x0a66c2, url:'https://www.linkedin.com/in/raatbek-zhumabekov-055a55221/', handle:'Raatbek Zhumabekov', accent:'#4fc3f7',
    svg:`<svg viewBox="0 0 38 38"><rect x="2" y="2" width="34" height="34" rx="8" fill="#0A66C2"/><rect x="9" y="15" width="5" height="15" rx="2" fill="#fff"/><circle cx="11.5" cy="11" r="2.5" fill="#fff"/><path d="M18 15h5v2.5s1.2-2.5 4.5-2.5C31 15 32 17.5 32 21v9h-5v-8c0-1.8-.6-3-2.3-3-1.8 0-3 1.2-3 3v8h-4.7V15z" fill="#fff"/></svg>` },
  { label:'Instagram',color:0xc13584, url:'https://www.instagram.com/theratbeko/',                     handle:'@theratbeko', accent:'#f48fb1',
    svg:`<svg viewBox="0 0 38 38"><defs><linearGradient id="ig" x1="0" y1="38" x2="38" y2="0"><stop stop-color="#f09433"/><stop offset=".25" stop-color="#e6683c"/><stop offset=".5" stop-color="#dc2743"/><stop offset=".75" stop-color="#cc2366"/><stop offset="1" stop-color="#bc1888"/></linearGradient></defs><rect x="2" y="2" width="34" height="34" rx="9" fill="url(#ig)"/><rect x="9" y="9" width="20" height="20" rx="6" stroke="#fff" stroke-width="2.2"/><circle cx="19" cy="19" r="5" stroke="#fff" stroke-width="2.2"/><circle cx="26" cy="12" r="1.6" fill="#fff"/></svg>` },
];

// ── CURVE ─────────────────────────────────────────────────────
const WP = [
  new THREE.Vector3(-7, 0,  6),
  new THREE.Vector3(-4, 0,  3),
  new THREE.Vector3(-1, 0,  1),
  new THREE.Vector3( 2, 0, -2),
  new THREE.Vector3( 5, 0, -4),
  new THREE.Vector3( 7, 0, -6),
];
const CURVE  = new THREE.CatmullRomCurve3(WP);
const STOP_T = [0.0, 0.33, 0.66, 1.0];

// ── RENDERER ──────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x3a5c3a);
scene.fog        = new THREE.FogExp2(0x3a5c3a, 0.045);

const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 120);
camera.position.set(0, 15, 13);
camera.lookAt(0, 0, 0);

// ── LIGHTS ────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x88bb88, 0.9));

const sun = new THREE.DirectionalLight(0xfff5cc, 1.5);
sun.position.set(10, 20, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left   = -18; sun.shadow.camera.right = 18;
sun.shadow.camera.top    =  18; sun.shadow.camera.bottom = -18;
sun.shadow.camera.far    = 60;
sun.shadow.bias          = -0.001;
scene.add(sun);

const fill = new THREE.DirectionalLight(0x88ccff, 0.3);
fill.position.set(-8, 6, -5);
scene.add(fill);

// ── HELPERS ───────────────────────────────────────────────────
function mesh(geo, color) {
  return new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color }));
}
function addMesh(geo, color, px, py, pz, parent) {
  const m = mesh(geo, color);
  m.position.set(px, py, pz);
  m.castShadow   = true;
  m.receiveShadow = true;
  parent.add(m);
  return m;
}

// ── GROUND ────────────────────────────────────────────────────
const gGeo = new THREE.PlaneGeometry(40, 40, 30, 30);
const gPos = gGeo.attributes.position;
for (let i = 0; i < gPos.count; i++) {
  const x = gPos.getX(i), z = gPos.getZ(i);
  gPos.setY(i, Math.sin(x * .35) * Math.cos(z * .28) * .22 + Math.sin(x * .9 + z * .7) * .08);
}
gGeo.computeVertexNormals();
const ground = new THREE.Mesh(gGeo, new THREE.MeshLambertMaterial({ color: 0x4a8a40 }));
ground.rotation.x    = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ── ROAD ──────────────────────────────────────────────────────
(function () {
  const pts = CURVE.getPoints(100), W = 0.75;
  const verts = [], uvs = [], idx = [];
  pts.forEach((pt, i) => {
    const t   = i / (pts.length - 1);
    const tan = CURVE.getTangent(t);
    const r   = new THREE.Vector3(-tan.z, 0, tan.x).normalize().multiplyScalar(W);
    verts.push(pt.x + r.x, 0.03, pt.z + r.z,  pt.x - r.x, 0.03, pt.z - r.z);
    uvs.push(0, t * 8, 1, t * 8);
    if (i < pts.length - 1) {
      const a = i * 2;
      idx.push(a, a+1, a+2,  a+1, a+3, a+2);
    }
  });
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  const road = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: 0x7a6a50 }));
  road.receiveShadow = true;
  scene.add(road);

  // dashes
  for (let i = 2; i < pts.length - 2; i += 5) {
    const p   = pts[i];
    const ang = Math.atan2(CURVE.getTangent(i / (pts.length - 1)).x, CURVE.getTangent(i / (pts.length - 1)).z);
    const d   = mesh(new THREE.BoxGeometry(0.06, 0.03, 0.28), 0xfff0bb);
    d.position.set(p.x, 0.05, p.z);
    d.rotation.y    = ang;
    d.castShadow    = true;
    d.receiveShadow = true;
    scene.add(d);
  }

  // fence posts
  for (let i = 1; i < pts.length - 1; i += 3) {
    const p   = pts[i];
    const tan = CURVE.getTangent(i / (pts.length - 1));
    const r2  = new THREE.Vector3(-tan.z, 0, tan.x).normalize();
    [1.15, -1.15].forEach(side => {
      const post = mesh(new THREE.BoxGeometry(0.06, 0.35, 0.06), 0xc8a878);
      post.position.set(p.x + r2.x * side, 0.18, p.z + r2.z * side);
      post.castShadow    = true;
      post.receiveShadow = true;
      scene.add(post);
    });
  }
})();

// ── TREES ─────────────────────────────────────────────────────
function makeTree(x, z, s) {
  const g = new THREE.Group();
  addMesh(new THREE.CylinderGeometry(0.08*s, 0.12*s, 0.55*s, 7), 0x6b4226, 0, 0.28*s, 0, g);
  [[0.7,0.5,1],[0.55,0.85,0.8],[0.4,1.15,0.62]].forEach(([r,y,rs], i) => {
    const c = new THREE.Mesh(
      new THREE.ConeGeometry(r*s*rs, r*s*1.5, 7),
      new THREE.MeshLambertMaterial({ color: [0x2d6e2d, 0x3a8c3a, 0x226022][i] })
    );
    c.position.y   = y * s;
    c.castShadow   = true;
    g.add(c);
  });
  g.position.set(x, 0, z);
  g.rotation.y = Math.random() * Math.PI * 2;
  scene.add(g);
}
[ [-5,5,1.1],[-7,2,0.9],[-6,-1,1.3],[-4,-4,0.8],[-2,-6,1.0],[0,-7,1.2],
  [2,-5,0.9],[4,-3,1.1],[6,-1,0.8],[7,2,1.0],[5,5,1.2],[2,7,0.9],
  [-1,7,1.1],[-4,7,0.85],[-8,4,1.3],[-9,0,1.0],[-7,-4,0.9],[8,4,1.1],
  [9,0,0.85],[8,-3,1.2],[4,8,1.0],[-3,9,0.8],[6,7,1.15],[-6,8,0.9],
  [3,-8,1.0],[-5,-7,1.2],[1,9,0.85],[-9,-3,0.9],[0,10,1.0]
].forEach(([x,z,s]) => makeTree(x+(Math.random()-.5)*.4, z+(Math.random()-.5)*.4, s));

// ── BUSHES ────────────────────────────────────────────────────
[[-3,2],[-5,0],[1,-3],[3,1],[-2,-5],[4,3],[-1,5],[5,-2],[2,-7],[-4,4],[6,2],[3,-5]].forEach(([x,z]) => {
  const g = new THREE.Group();
  const s = 0.6 + Math.random() * 0.5;
  [[0,0,0.38],[0.2,0.1,0.28],[-0.2,0.08,0.3],[0,0.2,0.26]].forEach(([bx,by,r]) => {
    const b = new THREE.Mesh(
      new THREE.SphereGeometry(r*s, 6, 5),
      new THREE.MeshLambertMaterial({ color: 0x2d7a2d })
    );
    b.position.set(bx*s, by*s+0.1, 0);
    b.castShadow = true;
    g.add(b);
  });
  g.position.set(x, 0, z);
  scene.add(g);
});

// ── ROCKS ─────────────────────────────────────────────────────
[[-3.5,3.5],[1.5,-4],[5,1],[-6,-2],[3,6],[-1,-7],[6,-3],[-4,6],[2,4]].forEach(([x,z]) => {
  const g = new THREE.Group();
  for (let i = 0; i < 2 + Math.floor(Math.random()*2); i++) {
    const s = 0.12 + Math.random() * 0.18;
    const r = mesh(new THREE.DodecahedronGeometry(s, 0), 0x8a8070);
    r.position.set((Math.random()-.5)*.3, s*.5, (Math.random()-.5)*.3);
    r.rotation.set(Math.random()*6, Math.random()*6, Math.random()*6);
    r.receiveShadow = true;
    g.add(r);
  }
  g.position.set(x, 0, z);
  scene.add(g);
});

// ── START ARCH ────────────────────────────────────────────────
(function () {
  const sp  = CURVE.getPoint(0);
  const tan = CURVE.getTangent(0);
  const g   = new THREE.Group();
  const pm  = new THREE.MeshLambertMaterial({ color: 0xd4a855 });
  [-0.9, 0.9].forEach(side => {
    const p = new THREE.Mesh(new THREE.BoxGeometry(0.14, 1.8, 0.14), pm);
    p.position.set(side, 0.9, 0);
    p.castShadow = p.receiveShadow = true;
    g.add(p);
  });
  const beam = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.18, 0.14), pm);
  beam.position.set(0, 1.8, 0);
  beam.castShadow = true;
  g.add(beam);
  const flag = mesh(new THREE.BoxGeometry(0.5, 0.3, 0.04), 0xee4444);
  flag.position.set(0.55, 2.1, 0);
  g.add(flag);
  g.position.copy(sp);
  g.rotation.y = Math.atan2(tan.x, tan.z);
  scene.add(g);
})();

// ── SIGN POSTS ────────────────────────────────────────────────
const signData = []; // { group, popupPos3D, scale }
STOPS.forEach((stop, i) => {
  if (i === 0) return;
  const pt    = CURVE.getPoint(STOP_T[i]);
  const tan   = CURVE.getTangent(STOP_T[i]);
  const right = new THREE.Vector3(-tan.z, 0, tan.x).normalize();
  const g     = new THREE.Group();

  const pole = mesh(new THREE.CylinderGeometry(0.05, 0.05, 2.2, 8), 0xdddddd);
  pole.position.set(0, 1.1, 0);
  pole.castShadow = pole.receiveShadow = true;
  g.add(pole);

  const board = new THREE.Mesh(
    new THREE.BoxGeometry(0.9, 0.5, 0.1),
    new THREE.MeshLambertMaterial({ color: stop.color })
  );
  board.position.set(0, 2.15, 0);
  board.castShadow = board.receiveShadow = true;
  g.add(board);

  const ring = mesh(new THREE.TorusGeometry(0.18, 0.025, 8, 16), 0xffffff);
  ring.position.set(0, 2.15, 0.07);
  g.add(ring);

  const wx = pt.x + right.x * 1.3;
  const wz = pt.z + right.z * 1.3;
  g.position.set(wx, 0, wz);
  g.rotation.y = Math.atan2(tan.x, tan.z) + Math.PI * 0.5;
  g.scale.setScalar(0);
  scene.add(g);

  // 3D point for projecting popup — top of sign
  const popupWorld = new THREE.Vector3(wx, 3.0, wz);
  signData.push({ group: g, popupWorld, stopIdx: i, scale: 0 });
});

// ── CLOUDS ────────────────────────────────────────────────────
const clouds = [];
[[-6,9,-3],[3,11,-6],[-2,8.5,4],[7,10,1],[-9,9.5,-1]].forEach(([x,y,z]) => {
  const g = new THREE.Group();
  [[0,0,1.1],[0.8,0.2,0.8],[-0.8,0.1,0.75],[0.3,0.4,0.7],[-0.3,0.35,0.65]].forEach(([cx,cy,r]) => {
    const c = new THREE.Mesh(
      new THREE.SphereGeometry(r, 7, 5),
      new THREE.MeshLambertMaterial({ color: 0xeefaee, transparent: true, opacity: 0.82 })
    );
    c.position.set(cx, cy, 0);
    g.add(c);
  });
  g.position.set(x, y, z);
  g.rotation.y = Math.random() * Math.PI;
  scene.add(g);
  clouds.push({ mesh: g, speed: 0.003 + Math.random() * 0.004 });
});

// ── CHARACTER ─────────────────────────────────────────────────
function buildChar() {
  const g = new THREE.Group();

  const legL = addMesh(new THREE.BoxGeometry(0.10, 0.28, 0.10), 0x2a3a6a, -0.09, 0.25, 0, g);
  const legR = addMesh(new THREE.BoxGeometry(0.10, 0.28, 0.10), 0x2a3a6a,  0.09, 0.25, 0, g);

  addMesh(new THREE.BoxGeometry(0.10, 0.07, 0.14), 0x222222, -0.09, 0.04, 0.01, g); // shoe L
  addMesh(new THREE.BoxGeometry(0.10, 0.07, 0.14), 0x222222,  0.09, 0.04, 0.01, g); // shoe R

  addMesh(new THREE.BoxGeometry(0.30, 0.30, 0.18), 0x3a7fd4, 0, 0.55, 0, g);        // body
  addMesh(new THREE.BoxGeometry(0.16, 0.20, 0.08), 0x884422, 0, 0.55, -0.12, g);    // backpack

  const armL = addMesh(new THREE.BoxGeometry(0.09, 0.26, 0.09), 0x3a7fd4, -0.20, 0.54, 0, g);
  const armR = addMesh(new THREE.BoxGeometry(0.09, 0.26, 0.09), 0x3a7fd4,  0.20, 0.54, 0, g);

  addMesh(new THREE.BoxGeometry(0.10, 0.08, 0.10), 0xf5c08a, 0, 0.74, 0, g);        // neck
  addMesh(new THREE.BoxGeometry(0.26, 0.26, 0.24), 0xf5c08a, 0, 0.92, 0, g);        // head
  addMesh(new THREE.BoxGeometry(0.27, 0.10, 0.25), 0x3a2a1a, 0, 1.07, 0, g);        // hair

  addMesh(new THREE.BoxGeometry(0.055, 0.055, 0.04), 0x222222, -0.07, 0.93, 0.12, g); // eye L
  addMesh(new THREE.BoxGeometry(0.055, 0.055, 0.04), 0x222222,  0.07, 0.93, 0.12, g); // eye R
  addMesh(new THREE.BoxGeometry(0.10, 0.03, 0.04),  0x994422,  0.00, 0.84, 0.12, g); // smile

  g._legL = legL; g._legR = legR;
  g._armL = armL; g._armR = armR;
  scene.add(g);
  return g;
}
const char = buildChar();

// ── POPUP ─────────────────────────────────────────────────────
const popup     = document.getElementById('social-popup');
const popIcon   = document.getElementById('pop-icon');
const popName   = document.getElementById('pop-name');
const popHandle = document.getElementById('pop-handle');
const popCta    = document.getElementById('pop-cta');
let popupVisible = false;

function showPopup(idx) {
  const s = STOPS[idx];
  popIcon.innerHTML = `<div class="pulse-ring" style="background:${s.accent}44"></div>${s.svg}`;
  popName.textContent   = s.label;
  popHandle.textContent = s.handle;
  popCta.href           = s.url;
  popCta.style.color    = s.accent;
  popup.classList.add('show');
  popupVisible = true;
}
function hidePopup() {
  popup.classList.remove('show');
  popupVisible = false;
}

function worldToScreen(pos) {
  const v = pos.clone().project(camera);
  return {
    x: ( v.x * 0.5 + 0.5) * innerWidth,
    y: (-v.y * 0.5 + 0.5) * innerHeight
  };
}

// ── STATE ─────────────────────────────────────────────────────
let cur = 0, charT = 0, targetT = 0, moving = false, walkT = 0;
const camPos    = new THREE.Vector3(0, 15, 13);
const camLook   = new THREE.Vector3();
const camOffset = new THREE.Vector3(0, 15, 13);

const bL   = document.getElementById('bL');
const bR   = document.getElementById('bR');
const hint = document.getElementById('hint');
const charHint = document.getElementById('char-hint');
charHint.style.opacity = '1';

function setDots(i) {
  [0,1,2,3].forEach(j => document.getElementById('d'+j).classList.toggle('on', j === i));
}

function moveTo(next) {
  if (moving) return;
  moving = true;
  bL.disabled = true;
  bR.disabled = true;
  hint.style.opacity = '0';
  charHint.style.opacity = '0';
  hidePopup();
  targetT = STOP_T[next];
  const iv = setInterval(() => {
    if (!moving) {
      clearInterval(iv);
      cur = next;
      setDots(cur);
      bL.disabled = cur === 0;
      bR.disabled = cur === 3;
      if (cur > 0) showPopup(cur);
    }
  }, 80);
}

bL.onclick = () => { if (cur > 0) moveTo(cur - 1); };
bR.onclick = () => { if (cur < 3) moveTo(cur + 1); };
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'd') bR.click();
  if (e.key === 'ArrowLeft'  || e.key === 'a') bL.click();
});

// ── LOOP ──────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt      = Math.min(clock.getDelta(), 0.05);
  const elapsed = clock.elapsedTime;

  // move char along curve
  if (moving) {
    const diff = targetT - charT;
    if (Math.abs(diff) < 0.006) {
      charT = targetT;
      moving = false;
      walkT  = 0;
    } else {
      charT  += Math.sign(diff) * Math.min(1.1 * dt, Math.abs(diff));
      walkT  += dt * 9;
    }
  }

  const cp = CURVE.getPoint(charT);
  const ct = CURVE.getTangent(charT);
  char.position.set(cp.x, 0.08, cp.z);

  // smooth yaw
  const tyaw = Math.atan2(ct.x, ct.z);
  const dy   = ((tyaw - char.rotation.y + Math.PI) % (Math.PI * 2)) - Math.PI;
  char.rotation.y += dy * 0.12;

  if (moving) {
    char._legL.rotation.x =  Math.sin(walkT) * 0.55;
    char._legR.rotation.x = -Math.sin(walkT) * 0.55;
    char._armL.rotation.x = -Math.sin(walkT) * 0.45;
    char._armR.rotation.x =  Math.sin(walkT) * 0.45;
    char.position.y = 0.08 + Math.abs(Math.sin(walkT * 2)) * 0.04;
  } else {
    char._legL.rotation.x *= 0.8;
    char._legR.rotation.x *= 0.8;
    char._armL.rotation.x *= 0.8;
    char._armR.rotation.x *= 0.8;
    char.position.y = 0.08 + Math.sin(elapsed * 1.8) * 0.018;
    // head toward sign
    if (cur > 0 && signData[cur-1]) {
      const sp = signData[cur-1].popupWorld;
      char.rotation.y += (Math.atan2(sp.x - cp.x, sp.z - cp.z) - char.rotation.y) * 0.05;
    }
  }

  // update char-hint position above head
  if (charHint.style.opacity !== '0') {
    const headPos = new THREE.Vector3(cp.x, char.position.y + 1.8, cp.z);
    const sc = worldToScreen(headPos);
    charHint.style.left = sc.x + 'px';
    charHint.style.top  = (sc.y - 10) + 'px';
  }

  // sign scale pop-in
  signData.forEach(sd => {
    const dist = cp.distanceTo(sd.group.position);
    const want = dist < 3.5 ? 1 : 0;
    sd.scale += (want - sd.scale) * 0.08;
    sd.group.scale.setScalar(sd.scale);
    sd.group.rotation.y += 0.004;
  });

  // update popup screen position
  if (popupVisible && cur > 0) {
    const sd = signData[cur - 1];
    if (sd) {
      const sc = worldToScreen(sd.popupWorld);
      popup.style.left = sc.x + 'px';
      popup.style.top  = sc.y + 'px';
    }
  }

  // clouds
  clouds.forEach(c => {
    c.mesh.position.x += c.speed;
    if (c.mesh.position.x > 14) c.mesh.position.x = -14;
  });

  // camera follow
  const ideal = new THREE.Vector3(cp.x + camOffset.x, camOffset.y, cp.z + camOffset.z);
  camPos.lerp(ideal, 0.04);
  camera.position.copy(camPos);
  camLook.lerp(cp, 0.06);
  camera.lookAt(camLook);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
